services:
  retro-guide-poc:
    build: .
    container_name: retro-guide-poc
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./sample_data:/app/sample_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RETROGUIDE_HOST=0.0.0.0
      - RETROGUIDE_PORT=8787
      # Optional: map LAN hostnames that the container cannot resolve.
      # Example:
      # RETROGUIDE_HOST_ALIASES=iptv.lan=10.7.0.25,epg.lan=10.7.0.26
